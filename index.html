<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VieStatic Demo</title>

  <!-- VieStatic Styles -->
  <link rel="stylesheet" href="viestatic.css">

  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 40px;
      background: #f7f7f7;
      color: #222;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
      max-width: 600px;
      line-height: 1.6;
    }

    .demo-box {
      margin-top: 40px;
      padding: 20px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }
  </style>
</head>
<body>

  <h1>VieStatic Demo</h1>
  <p>
    This page demonstrates the VieStatic floating QR badge.  
    Click the badge to open the modal and scan the QR code.
  </p>

  <div class="demo-box">
    <p>
      You can customize the badge position using:
      <code>data-pos="1|2|3|4"</code>
    </p>
    <p>
      You can also override the URL using:
      <code>data-url="https://example.com"</code>
    </p>
  </div>

  <!-- QR Engine (must load BEFORE viestatic.js) -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>

  <!-- VieStatic -->
  <script src="viestatic.js"
          data-pos="3"
          data-url="">
  </script>

</body>
</html>
